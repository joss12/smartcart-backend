openapi: 3.0.3
info:
  title: SmartCart API
  version: 1.0.0
  description: E-commerce backend API with auth, products, orders, payments, and audit logging
servers:
  - url: /

paths:
  /health:
    get:
      summary: Health check
      tags: [Health]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  uptime: { type: number }

  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      summary: Login with email and password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/refresh:
    post:
      summary: Refresh access token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: New access token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products:
    get:
      summary: List products
      tags: [Products]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                  nextCursor: { type: string, nullable: true }

    post:
      summary: Create product (admin only)
      tags: [Products]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, price_cents]
              properties:
                name: { type: string }
                price_cents: { type: integer }
                currency: { type: string, default: USD }
                description: { type: string }
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  product:
                    $ref: "#/components/schemas/Product"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products/inventory/set:
    post:
      summary: Set product stock (admin only)
      tags: [Products]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, stock]
              properties:
                productId: { type: string, format: uuid }
                stock: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Stock updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  product:
                    type: object
                    properties:
                      id: { type: string }
                      stock: { type: integer }
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products/{productId}/images:
    post:
      summary: Upload product image (admin only)
      tags: [Products]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
      responses:
        "201":
          description: Image uploaded
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /orders:
    post:
      summary: Create order
      tags: [Orders]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                currency: { type: string, default: USD }
                items:
                  type: array
                  items:
                    type: object
                    required: [productId, qty]
                    properties:
                      productId: { type: string, format: uuid }
                      qty: { type: integer, minimum: 1 }
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  order:
                    $ref: "#/components/schemas/Order"
        "400":
          description: Insufficient stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /orders/{id}:
    get:
      summary: Get order by ID
      tags: [Orders]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  order:
                    $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /webhooks/payment:
    post:
      summary: Handle payment webhook
      tags: [Webhooks]
      parameters:
        - in: header
          name: x-webhook-signature
          required: true
          schema: { type: string }
        - in: header
          name: x-webhook-id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId, status]
              properties:
                orderId: { type: string, format: uuid }
                status: { type: string, enum: [paid] }
      responses:
        "200":
          description: Webhook processed
        "401":
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /audit:
    get:
      summary: List audit events (admin only)
      tags: [Audit]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: Audit log entries
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Product:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        price_cents: { type: integer }
        currency: { type: string }
        description: { type: string, nullable: true }
        stock: { type: integer }
        created_at: { type: string, format: date-time }

    Order:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        total_cents: { type: integer }
        currency: { type: string }
        status: { type: string, enum: [pending, paid, cancelled] }
        created_at: { type: string, format: date-time }

    AuthResponse:
      type: object
      properties:
        ok: { type: boolean }
        accessToken: { type: string }
        refreshToken: { type: string }

    Error:
      type: object
      properties:
        ok: { type: boolean }
        error: { type: string }
        message: { type: string }
