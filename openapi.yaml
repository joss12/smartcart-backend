openapi: 3.0.3
info:
  title: SmartCart API
  version: 1.0.0
  description: E-commerce backend API with auth, products, orders, payments, and audit logging
servers:
  - url: https://smartcart-backend-i1zg.onrender.com
    description: Production
  - url: http://localhost:3000
    description: Local

paths:
  /health/live:
    get:
      summary: Liveness check
      tags: [Health]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  /health/ready:
    get:
      summary: Readiness check
      tags: [Health]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  uptime: { type: number }

  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      summary: Login with email and password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/refresh:
    post:
      summary: Refresh access token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: New access token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/verify-email/{token}:
    get:
      summary: Verify email address
      tags: [Auth]
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Email verified
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/forgot-password:
    post:
      summary: Request password reset email
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: Reset email sent if account exists

  /auth/reset-password/{token}:
    post:
      summary: Reset password using token
      tags: [Auth]
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string, minLength: 6 }
      responses:
        "200":
          description: Password reset successfully
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products:
    get:
      summary: List products
      tags: [Products]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                  nextCursor: { type: string, nullable: true }

    post:
      summary: Create product (admin only)
      tags: [Products]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, price_cents]
              properties:
                name: { type: string }
                price_cents: { type: integer }
                currency: { type: string, default: USD }
                description: { type: string }
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  product:
                    $ref: "#/components/schemas/Product"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products/{productId}:
    get:
      summary: Get product by ID
      tags: [Products]
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  product:
                    $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products/inventory/set:
    post:
      summary: Set product stock (admin only)
      tags: [Products]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, stock]
              properties:
                productId: { type: string, format: uuid }
                stock: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Stock updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  product:
                    type: object
                    properties:
                      id: { type: string }
                      stock: { type: integer }
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products/{productId}/images:
    post:
      summary: Upload product image (admin only)
      tags: [Products]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
      responses:
        "201":
          description: Image uploaded
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /cart:
    get:
      summary: Get current cart
      tags: [Cart]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cart contents
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        productId: { type: string }
                        name: { type: string }
                        qty: { type: integer }
                        unitPriceCents: { type: integer }
                        lineTotalCents: { type: integer }
                  totalCents: { type: integer }

  /cart/items:
    post:
      summary: Add item to cart
      tags: [Cart]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, qty]
              properties:
                productId: { type: string, format: uuid }
                qty: { type: integer, minimum: 1 }
      responses:
        "201":
          description: Item added
        "400":
          description: Product not found or invalid qty
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /cart/items/{productId}:
    patch:
      summary: Update cart item quantity
      tags: [Cart]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [qty]
              properties:
                qty: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Cart updated
        "404":
          description: Item not in cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Remove item from cart
      tags: [Cart]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Item removed
        "404":
          description: Item not in cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /cart/checkout:
    post:
      summary: Checkout cart and create order
      tags: [Cart]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currency: { type: string, default: USD }
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  order:
                    $ref: "#/components/schemas/Order"
        "400":
          description: Cart empty or insufficient stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /orders:
    post:
      summary: Create order directly
      tags: [Orders]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                currency: { type: string, default: USD }
                items:
                  type: array
                  items:
                    type: object
                    required: [productId, qty]
                    properties:
                      productId: { type: string, format: uuid }
                      qty: { type: integer, minimum: 1 }
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  order:
                    $ref: "#/components/schemas/Order"
        "400":
          description: Insufficient stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /orders/my/orders:
    get:
      summary: Get my orders
      tags: [Orders]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of user's orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      summary: Get order by ID
      tags: [Orders]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  order:
                    $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /webhooks/payment:
    post:
      summary: Handle payment webhook
      tags: [Webhooks]
      parameters:
        - in: header
          name: x-webhook-signature
          required: true
          schema: { type: string }
        - in: header
          name: x-webhook-id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId, status]
              properties:
                orderId: { type: string, format: uuid }
                status: { type: string, enum: [paid] }
      responses:
        "200":
          description: Webhook processed
        "401":
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/stats:
    get:
      summary: Get platform stats (admin only)
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  stats:
                    type: object
                    properties:
                      totalUsers: { type: integer }
                      totalOrders: { type: integer }
                      totalRevenueCents: { type: integer }
                      ordersToday: { type: integer }
                      lowStockProducts:
                        type: array
                        items:
                          $ref: "#/components/schemas/Product"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/users:
    get:
      summary: List all users (admin only)
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: User list
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/users/{id}/role:
    patch:
      summary: Update user role (admin only)
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [user, admin] }
      responses:
        "200":
          description: Role updated
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /audit:
    get:
      summary: List audit events (admin only)
      tags: [Audit]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: Audit log entries
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Product:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        price_cents: { type: integer }
        currency: { type: string }
        description: { type: string, nullable: true }
        stock: { type: integer }
        created_at: { type: string, format: date-time }

    Order:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        total_cents: { type: integer }
        currency: { type: string }
        status: { type: string, enum: [created, paid, cancelled] }
        created_at: { type: string, format: date-time }

    AuthResponse:
      type: object
      properties:
        ok: { type: boolean }
        accessToken: { type: string }
        refreshToken: { type: string }

    Error:
      type: object
      properties:
        ok: { type: boolean }
        error: { type: string }
        message: { type: string }
