version: "3.9"

services:
  api:
    build: .
    container_name: smartcart-api
    env_file:
      - .env
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: smartcart-redis
    ports:
      - "6379:6379"
